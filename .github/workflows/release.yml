name: Release

# Tag a commit to cut a release:  git tag v0.0.3 && git push origin v0.0.3
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package lib + loader
        run: |
          zip -r "KeboldersPalLib-${GITHUB_REF_NAME}.zip" \
            Mods/shared/KeboldersPalLib \
            Mods/PalLibLoader

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "KeboldersPalLib-${GITHUB_REF_NAME}.zip" \
            --title "KeboldersPalLib $GITHUB_REF_NAME" \
            --notes-file .github/release-notes.md
